<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYUSH Medicine Store - Traditional Healing Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#1e40af',
                        ayush: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d' }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
            50% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.5); }
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease-out;
        }
        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #d1d5db;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border-color: #16a34a;
            animation: pulse-green 2s infinite;
        }
        .filter-btn:not(.active):hover {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
        }

        .floating-cart {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border-radius: 50px;
            padding: 15px 25px;
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            animation: float 3s ease-in-out infinite;
        }
        .floating-cart:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(34, 197, 94, 0.6);
        }

        .product-image {
            background: linear-gradient(45deg, #f3f4f6, #e5e7eb);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            height: 200px;
            transition: all 0.3s ease;
        }
        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-siddha { background: #dcfce7; color: #166534; }
        .badge-unani { background: #dbeafe; color: #1e40af; }
        .badge-ayurveda { background: #fef3c7; color: #92400e; }

        .search-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .search-bar:focus {
            border-color: #22c55e;
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            animation: fadeInUp 0.3s ease-out;
        }
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>

    <!-- Search and Filters -->
    <section class="max-w-7xl mx-auto px-4 mb-12">
        <!-- Search Bar -->
        <div class="text-center mb-8">
            <input 
                id="searchInput"
                type="text" 
                placeholder="🔍 Search for medicines, herbs, or treatments..."
                class="search-bar w-full max-w-2xl"
                oninput="filterProducts()"
            />
        </div>

        <!-- Filter Buttons -->
        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <button class="filter-btn active" onclick="setFilter('all')">All Products</button>
            <button class="filter-btn" onclick="setFilter('siddha')">🌿 Siddha</button>
            <button class="filter-btn" onclick="setFilter('unani')">🕌 Unani</button>
            <button class="filter-btn" onclick="setFilter('ayurveda')">🧘 Ayurveda</button>
            <button class="filter-btn" onclick="setFilter('herbs')">🌱 Herbal</button>
            <button class="filter-btn" onclick="setFilter('oils')">💧 Oils</button>
        </div>

        <!-- Sort Options -->
        <div class="flex justify-center gap-4 mb-8">
            <select id="sortSelect" onchange="sortProducts()" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                <option value="name">Sort by Name</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
                <option value="popularity">Most Popular</option>
            </select>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="max-w-7xl mx-auto px-4 mb-16">
        <div id="productsGrid" class="products-grid">
            <!-- Products will be populated by JavaScript -->
        </div>
        
        <!-- No Results Message -->
        <div id="noResults" class="text-center py-16 hidden">
            <div class="text-6xl mb-4">🔍</div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">No products found</h3>
            <p class="text-gray-600">Try adjusting your search or filter criteria</p>
        </div>
    </section>

    <!-- Floating Cart Button -->
    <div class="floating-cart" onclick="toggleCart()">
        🛒 <span id="floatingCartCount">0</span>
    </div>

    <!-- Product Detail Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl hover:text-red-500">×</button>
            <div id="modalContent">
                <!-- Product details will be populated here -->
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">🛒 Shopping Cart</h2>
                <button onclick="toggleCart()" class="text-2xl hover:text-red-500">×</button>
            </div>
            <div id="cartItems">
                <!-- Cart items will be populated here -->

            <div class="border-t pt-4 mt-4">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xl font-bold">Total:</span>
                    <span id="cartTotal" class="text-2xl font-bold text-primary">₹0</span>

                <button onclick="checkout()" class="w-full bg-gradient-to-r from-primary to-emerald-600 text-white py-3 px-6 rounded-lg font-bold text-lg hover:shadow-lg transition-all">

            {

                category: "ayurveda",
                type: "cosmetic",
                price: 159,
                originalPrice: 199,
                image: "🌿",
                rating: 4.3,
                reviews: 87,
                description: "Pure neem face pack for acne-prone skin. Natural purification and glow enhancement.",
                benefits: ["Acne control", "Skin purification", "Natural glow", "Oil control"],
                ingredients: "Neem powder, Fuller's earth, Rose water",
                dosage: "Apply 2-3 times weekly for 15 minutes",
                popularity: 68
            },
            {
                id: 10,
                name: "Chyawanprash Immunity Booster",
                category: "ayurveda",
                type: "paste",
                price: 449,
                originalPrice: 549,
                image: "🍯",
                rating: 4.9,
                reviews: 234,
                description: "Traditional Chyawanprash with 40+ herbs for complete immunity and vitality.",
                benefits: ["Immunity boost", "Energy enhancement", "Respiratory health", "Anti-aging"],
                ingredients: "Amla, Ashwagandha, Giloy, Honey, Ghee",
                dosage: "1 tablespoon daily with milk",
                popularity: 98
            }
        ];

        let cart = JSON.parse(localStorage.getItem('ayush_cart')) || [];
        let wishlist = JSON.parse(localStorage.getItem('ayush_wishlist')) || [];
        let currentFilter = 'all';
        let currentSort = 'name';

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            displayProducts();
            updateCartCount();
            updateWishlistCount();
        });

        // Display products
        function displayProducts() {
            let filteredProducts = filterByCategory();
            filteredProducts = filterBySearch(filteredProducts);
            filteredProducts = sortProductsArray(filteredProducts);

            const grid = document.getElementById('productsGrid');
            const noResults = document.getElementById('noResults');

            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = filteredProducts.map(product => createProductCard(product)).join('');
        }

        function createProductCard(product) {
            const discount = Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100);
            const stars = '★'.repeat(Math.floor(product.rating)) + '☆'.repeat(5 - Math.floor(product.rating));
            
            return `
                <div class="product-card p-6">
                    <div class="relative mb-4">
                        <div class="product-image">${product.image}</div>
                        ${discount > 0 ? `<div class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2 py-1 rounded-full">${discount}% OFF</div>` : ''}
                        <button onclick="toggleWishlistItem(${product.id})" class="absolute top-2 left-2 text-2xl hover:scale-110 transition-transform ${wishlist.includes(product.id) ? 'text-red-500' : 'text-gray-400'}">
                            ${wishlist.includes(product.id) ? '❤️' : '🤍'}
                        </button>
                    </div>
                    
                    <div class="mb-2">
                        <span class="badge badge-${product.category}">${product.category}</span>
                    </div>
                    
                    <h3 class="text-xl font-bold text-gray-800 mb-2">${product.name}</h3>
                    <p class="text-gray-600 text-sm mb-3 line-clamp-2">${product.description}</p>
                    
                    <div class="flex items-center mb-3">
                        <span class="text-yellow-500">${stars}</span>
                        <span class="ml-2 text-sm text-gray-600">${product.rating} (${product.reviews})</span>
                    </div>
                    
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <span class="text-2xl font-bold text-primary">₹${product.price}</span>
                            ${product.originalPrice > product.price ? `<span class="text-gray-500 line-through text-sm ml-2">₹${product.originalPrice}</span>` : ''}
                        </div>
                    </div>
                    
                    <div class="flex gap-2">
                        <button onclick="addToCart(${product.id})" class="flex-1 bg-gradient-to-r from-primary to-emerald-600 text-white py-2 px-4 rounded-lg font-semibold hover:shadow-lg transition-all">
                            🛒 Add to Cart
                        </button>
                        <button onclick="showProductDetail(${product.id})" class="bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 px-4 rounded-lg transition-all">
                            👁️
                        </button>
                    </div>
                </div>
            `;
        }

        // Filter functions
        function setFilter(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayProducts();
        }

        function filterByCategory() {
            if (currentFilter === 'all') return products;
            return products.filter(product => product.category === currentFilter || product.type === currentFilter);
        }

        function filterBySearch(productList) {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) return productList;
            
            return productList.filter(product => 
                product.name.toLowerCase().includes(searchTerm) ||
                product.description.toLowerCase().includes(searchTerm) ||
                product.category.toLowerCase().includes(searchTerm) ||
                product.ingredients.toLowerCase().includes(searchTerm)
            );
        }

        function filterProducts() {
            displayProducts();
        }

        // Sort functions
        function sortProducts() {
            currentSort = document.getElementById('sortSelect').value;
            displayProducts();
        }

        function sortProductsArray(productList) {
            return [...productList].sort((a, b) => {
                switch (currentSort) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'price-low':
                        return a.price - b.price;
                    case 'price-high':
                        return b.price - a.price;
                    case 'rating':
                        return b.rating - a.rating;
                    case 'popularity':
                        return b.popularity - a.popularity;
                    default:
                        return 0;
                }
            });
        }

        // Cart functions
        function addToCart(productId) {
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id: productId, quantity: 1 });
            }
            
            localStorage.setItem('ayush_cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`Added to cart! 🛒`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('ayush_cart', JSON.stringify(cart));
            updateCartCount();
            displayCartItems();
        }

        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    localStorage.setItem('ayush_cart', JSON.stringify(cart));
                    displayCartItems();
                }
            }
        }

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('floatingCartCount').textContent = count;
            
            if (count > 0) {
                document.getElementById('cartCount').classList.remove('hidden');
            } else {
                document.getElementById('cartCount').classList.add('hidden');
            }
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.toggle('show');
            if (modal.classList.contains('show')) {
                displayCartItems();
            }
        }

        function displayCartItems() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-center text-gray-500 py-8">Your cart is empty 🛒</p>';
                cartTotal.textContent = '₹0';
                return;
            }

            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                const product = products.find(p => p.id === item.id);
                const itemTotal = product.price * item.quantity;
                total += itemTotal;
                
                return `
                    <div class="flex items-center justify-between border-b py-4">
                        <div class="flex items-center space-x-4">
                            <div class="text-2xl">${product.image}</div>
                            <div>
                                <h4 class="font-semibold">${product.name}</h4>
                                <p class="text-gray-600">₹${product.price}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="updateQuantity(${item.id}, -1)" class="bg-gray-200 hover:bg-gray-300 w-8 h-8 rounded-full">-</button>
                            <span class="font-semibold">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 1)" class="bg-primary hover:bg-emerald-600 text-white w-8 h-8 rounded-full">+</button>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-700 ml-2">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            cartTotal.textContent = `₹${total}`;
        }

        // Wishlist functions
        function toggleWishlistItem(productId) {
            if (wishlist.includes(productId)) {
                wishlist = wishlist.filter(id => id !== productId);
                showToast('Removed from wishlist 💔');
            } else {
                wishlist.push(productId);
                showToast('Added to wishlist ❤️');
            }
            
            localStorage.setItem('ayush_wishlist', JSON.stringify(wishlist));
            updateWishlistCount();
            displayProducts(); // Refresh to update heart icons
        }

        function updateWishlistCount() {
            const count = wishlist.length;
            document.getElementById('wishlistCount').textContent = count;
            
            if (count > 0) {
                document.getElementById('wishlistCount').classList.remove('hidden');
            } else {
                document.getElementById('wishlistCount').classList.add('hidden');
            }
        }

        function toggleWishlist() {
            showToast('Wishlist feature - coming soon! ❤️');
        }

        // Product detail modal
        function showProductDetail(productId) {
            const product = products.find(p => p.id === productId);
            const modal = document.getElementById('productModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="text-center mb-6">
                    <div class="text-8xl mb-4">${product.image}</div>
                    <span class="badge badge-${product.category} mb-2">${product.category}</span>
                    <h2 class="text-3xl font-bold text-gray-800">${product.name}</h2>
                </div>
                
                <div class="mb-6">
                    <div class="flex items-center justify-center mb-4">
                        <span class="text-yellow-500 text-xl">★★★★★</span>
                        <span class="ml-2 text-gray-600">${product.rating} (${product.reviews} reviews)</span>
                    </div>
                    <div class="text-center mb-4">
                        <span class="text-3xl font-bold text-primary">₹${product.price}</span>
                        ${product.originalPrice > product.price ? `<span class="text-gray-500 line-through text-xl ml-2">₹${product.originalPrice}</span>` : ''}
                    </div>
                </div>
                
                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-2">Description</h3>
                    <p class="text-gray-700">${product.description}</p>
                </div>
                
                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-2">Benefits</h3>
                    <ul class="list-disc list-inside text-gray-700">
                        ${product.benefits.map(benefit => `<li>${benefit}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-2">Ingredients</h3>
                    <p class="text-gray-700">${product.ingredients}</p>
                </div>
                
                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-2">Dosage</h3>
                    <p class="text-gray-700">${product.dosage}</p>
                </div>
                
                <div class="flex gap-4">
                    <button onclick="addToCart(${product.id}); closeModal();" class="flex-1 bg-gradient-to-r from-primary to-emerald-600 text-white py-3 px-6 rounded-lg font-bold text-lg hover:shadow-lg transition-all">
                        🛒 Add to Cart
                    </button>
                    <button onclick="toggleWishlistItem(${product.id})" class="bg-red-100 hover:bg-red-200 text-red-600 py-3 px-6 rounded-lg font-bold text-lg transition-all">
                        ${wishlist.includes(product.id) ? '❤️ In Wishlist' : '🤍 Add to Wishlist'}
                    </button>
                </div>
            `;
            
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('show');
        }

        // Checkout function
        function checkout() {
            if (cart.length === 0) {
                showToast('Your cart is empty! 🛒');
                return;
            }
            
            const total = cart.reduce((sum, item) => {
                const product = products.find(p => p.id === item.id);
                return sum + (product.price * item.quantity);
            }, 0);
            
            showToast('🔒 Redirecting to secure payment gateway...');
            
            setTimeout(() => {
                alert(`Thank you for your order! 🎉\n\nOrder Total: ₹${total}\n\nYour traditional medicines will be delivered within 3-5 business days.`);
                cart = [];
                localStorage.setItem('ayush_cart', JSON.stringify(cart));
                updateCartCount();
                toggleCart();
            }, 2000);
        }

        // Toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-20 right-4 bg-primary text-white px-6 py-3 rounded-lg shadow-lg z-50 transform translate-x-full transition-transform duration-300';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-x-full'), 100);
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 3000);
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            const productModal = document.getElementById('productModal');
            const cartModal = document.getElementById('cartModal');
            if (event.target === productModal) {
                productModal.classList.remove('show');
            }
            if (event.target === cartModal) {
                cartModal.classList.remove('show');
            }
        }
    </script>
</body>
</html>
