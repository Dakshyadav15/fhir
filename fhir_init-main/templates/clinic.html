<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AYUSH Lookup - Clinic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#10b981',
            secondary: '#1e40af'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 to-blue-50 flex items-center justify-center p-4">
  <!-- Background decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-6 -left-6 w-40 h-40 bg-emerald-200 rounded-full opacity-20 animate-pulse"></div>
    <div class="absolute bottom-10 right-10 w-28 h-28 bg-blue-200 rounded-full opacity-20 animate-pulse" style="animation-delay:.8s"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-md bg-white/80 backdrop-blur-sm rounded-2xl shadow-2xl border border-white/50 p-8">
    <!-- Header -->
    <div class="text-center mb-6">
      <div class="text-5xl mb-3">🏥</div>
      <h1 class="text-2xl font-bold text-gray-800">Clinic Portal</h1>
      <p class="text-gray-600 mt-1">AYUSH Lookup for Clinics</p>
    </div>

    <!-- Clinic Login Form -->
    <div class="space-y-4">
      <div>
        <label for="clinicId" class="block text-sm font-semibold text-gray-700 mb-2">Clinic ID</label>
        <input id="clinicId" type="text" placeholder="Enter clinic ID"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white/70 outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition">
      </div>

      <div>
        <label for="clinicKey" class="block text-sm font-semibold text-gray-700 mb-2">Access Key</label>
        <input id="clinicKey" type="password" placeholder="Enter access key"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white/70 outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition">
      </div>

      <!-- Error message -->
      <div id="errorBox" class="hidden p-3 rounded-lg border border-red-200 bg-red-50 text-red-700 text-sm"></div>

      <button id="clinicLoginBtn"
              class="w-full bg-gradient-to-r from-secondary to-blue-700 hover:from-blue-700 hover:to-secondary text-white font-semibold py-3 rounded-lg transition transform hover:scale-105 hover:shadow-lg">
        Continue to Clinic Dashboard
      </button>

      <a href="login.html"
         class="block w-full text-center bg-gray-500 hover:bg-gray-600 text-white font-semibold py-3 rounded-lg transition">
        Back to Login
      </a>
    </div>

    <!-- Info -->
    <div class="text-center text-xs text-gray-500 pt-4 border-t border-gray-200 mt-6">
      <p>For authorized clinic staff only. Do not share credentials.</p>
    </div>
  </div>

  <script>
    // Validate: ID "a1" and password "123" -> clinicdashboard.html
    document.getElementById('clinicLoginBtn').addEventListener('click', function () {
      const clinicId = document.getElementById('clinicId').value.trim();
      const clinicKey = document.getElementById('clinicKey').value.trim();
      const errorBox = document.getElementById('errorBox');

      if (!clinicId || !clinicKey) {
        errorBox.textContent = 'Enter both Clinic ID and Access Key';
        errorBox.classList.remove('hidden');
        return;
      }

      if (clinicId === 'a1' && clinicKey === '123') {
        sessionStorage.setItem('ayush_clinic_id', clinicId);
        window.location.href = 'clinicdashboard.html';
      } else {
        errorBox.textContent = 'Invalid Clinic ID or Access Key';
        errorBox.classList.remove('hidden');
      }
    });

    // Enter key submission
    document.getElementById('clinicKey').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        document.getElementById('clinicLoginBtn').click();
      }
    });
  </script>
</body>
</html>
