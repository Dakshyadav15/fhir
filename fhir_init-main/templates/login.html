<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AYUSH Lookup - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#10b981', secondary: '#1e40af' }
        }
      }
    }
  </script>
  <style>
    .caret-blink { animation: caret 1s step-end infinite; }
    @keyframes caret { 50% { border-color: transparent; } }
    .pulse-delay-1 { animation-delay: 1s; }
    .pulse-delay-2 { animation-delay: 2s; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 to-blue-50">
  <main class="min-h-screen">
    <div class="flex flex-col md:flex-row h-screen">
      <!-- Left: 3/4 -->
      <section class="relative w-full md:w-3/4 flex items-center justify-center p-4">
        <!-- Background decoration -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
          <div class="absolute top-10 left-10 w-32 h-32 bg-emerald-200 rounded-full opacity-20 animate-pulse"></div>
          <div class="absolute bottom-20 right-20 w-24 h-24 bg-blue-200 rounded-full opacity-20 animate-pulse pulse-delay-1"></div>
          <div class="absolute top-1/2 left-1/4 w-16 h-16 bg-green-200 rounded-full opacity-20 animate-pulse pulse-delay-2"></div>
        </div>

        <!-- Login Card -->
        <div class="relative bg-white/80 backdrop-blur-sm rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/50">
          <div class="text-center mb-8">
            <div class="text-5xl mb-4">🌿</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">AYUSH Lookup</h1>
            <p class="text-gray-600">Traditional Medicine Search Portal</p>
          </div>

          <div class="space-y-6">
            <div>
              <label for="patientId" class="block text-sm font-semibold text-gray-700 mb-2">Patient ID </label>
              <input
                type="text"
                id="patientId"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-300 bg-white/70 backdrop-blur-sm"
                placeholder="Enter your patient ID"
                maxlength="50"
              >
              <p class="text-xs text-gray-500 mt-1">You can proceed without entering a Patient ID</p>
            </div>

            <div id="currentStatus" class="hidden p-3 bg-blue-50 border border-blue-200 rounded-lg">
              <p class="text-sm text-blue-700">
                <span class="font-medium">Current Patient ID:</span>
                <span id="currentPatientId" class="font-mono"></span>
              </p>
            </div>

            <div class="space-y-3">
              <button
                onclick="handleContinue()"
                class="w-full bg-gradient-to-r from-primary to-emerald-600 hover:from-emerald-600 hover:to-primary text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 transform hover:scale-105 hover:shadow-lg"
              >
                Continue to Search
              </button>

              <a href="clinic.html"
                 class="w-full inline-flex items-center justify-center bg-gradient-to-r from-secondary to-blue-700 hover:from-blue-700 hover:to-secondary text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 transform hover:scale-105 hover:shadow-lg">
                 🏥 Clinic login
              </a>

              <button
                onclick="handleClear()"
                class="w-full bg-gray-500 hover:bg-gray-600 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300"
                id="clearButton"
              >
                Clear Patient ID
              </button>
            </div>

            <div class="text-center text-xs text-gray-500 pt-4 border-t border-gray-200">
              <p>🔒 Your Patient ID is stored locally and never shared</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Right: 1/4 short quotes -->
      <section class="w-full md:w-1/4 flex items-center justify-center bg-gradient-to-b from-[#f9f7f1] to-[#e6f0e6] p-6">
        <h2 class="text-2xl md:text-3xl font-extrabold leading-snug tracking-wide text-[#1b5e20] drop-shadow-lg text-center">
          <span id="typewriter"></span>
          <span class="align-middle border-r-4 border-[#8d6e63] caret-blink ml-2" style="border-right-width:4px;">&nbsp;</span>
        </h2>
      </section>
    </div>
  </main>

  <script>
    // Short Ayurveda-themed quotes
    const quotes = [
      "Balance brings health.",
      "Heal with nature.",
      "Food is medicine.",
      "Breathe. Align. Heal.",
      "Spice your wellness.",
      "Warm water, wisdom.",
      "Move with rhythm.",
      "Rest restores prana.",
      "Seasonal living wins.",
      "Listen to your dosha."
    ];

    // Typewriter effect
    const target = document.getElementById('typewriter');
    let qIndex = 0, charIndex = 0, deleting = false;

    function typeLoop() {
      const current = quotes[qIndex];
      const speed = deleting ? 50 : 90;

      if (!deleting) {
        if (charIndex < current.length) {
          target.textContent = current.slice(0, charIndex + 1);
          charIndex++;
          setTimeout(typeLoop, speed);
        } else {
          setTimeout(() => { deleting = true; typeLoop(); }, 1200);
        }
      } else {
        if (charIndex > 0) {
          target.textContent = current.slice(0, charIndex - 1);
          charIndex--;
          setTimeout(typeLoop, speed);
        } else {
          deleting = false;
          qIndex = (qIndex + 1) % quotes.length;
          setTimeout(typeLoop, 250);
        }
      }
    }

    // Login logic (unchanged)
    function checkExistingLogin() {
      const isLoggedIn = localStorage.getItem('ayush_logged_in');
      if (isLoggedIn === 'true') {
        window.location.href = 'index.html';
        return;
      }
      const currentPatientId = localStorage.getItem('ayush_patient_id');
      if (currentPatientId) {
        document.getElementById('currentStatus').classList.remove('hidden');
        document.getElementById('currentPatientId').textContent = currentPatientId;
        document.getElementById('patientId').value = currentPatientId;
      }
    }

    function handleContinue() {
      const patientId = document.getElementById('patientId').value.trim();
      if (patientId) {
        localStorage.setItem('ayush_patient_id', patientId);
      } else {
        localStorage.removeItem('ayush_patient_id');
      }
      localStorage.setItem('ayush_logged_in', 'true');
      showMessage('Login successful! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    }

    function handleClear() {
      localStorage.removeItem('ayush_patient_id');
      localStorage.removeItem('ayush_logged_in');
      sessionStorage.removeItem('ayush_search_result');
      document.getElementById('patientId').value = '';
      document.getElementById('currentStatus').classList.add('hidden');
      showMessage('Patient ID cleared successfully', 'info');
    }

    function showMessage(message, type) {
      const existing = document.getElementById('tempMessage');
      if (existing) existing.remove();

      const colors = {
        success: 'bg-green-100 border-green-300 text-green-700',
        info: 'bg-blue-100 border-blue-300 text-blue-700',
        error: 'bg-red-100 border-red-300 text-red-700'
      };

      const el = document.createElement('div');
      el.id = 'tempMessage';
      el.className = `fixed top-4 right-4 p-4 border rounded-lg shadow-lg z-50 ${colors[type]} transform translate-x-full transition-transform duration-300`;
      el.innerHTML = `
        <div class="flex items-center space-x-2">
          <span>${message}</span>
          <button onclick="this.closest('#tempMessage').remove()" class="ml-2 hover:opacity-70">✕</button>
        </div>
      `;
      document.body.appendChild(el);
      setTimeout(() => el.classList.remove('translate-x-full'), 50);
      setTimeout(() => {
        if (el.parentElement) {
          el.classList.add('translate-x-full');
          setTimeout(() => el.remove(), 300);
        }
      }, 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkExistingLogin();
      typeLoop();
      document.getElementById('patientId').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleContinue();
        }
      });
    });
  </script>
</body>
</html>
